<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site html</title>
    <style>
        /* Estilos visuais para modernizar a página */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #333;
            text-align: center;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Cabeçalho do Site -->
    <header>
        <h1>Bem-vindo</h1>
    </header>

    <!-- Menu de Navegação -->
    <nav>
        <a href="#inicio">Início</a>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container">
        <section id="inicio">
            <h2>Biografia</h2>

            <h2>Sobre Mim</h2>
            <p>Sou estudante de informática da escola Abel coelho. Tenho 15 anos e meus hobbys favoritos são jogar futebol, conversar e video games.</p>
        </section>

</body>
</html>
